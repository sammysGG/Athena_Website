---
# Athena range — Valitsus (gov) target.
# Role tasks file: drop in as roles/<role>/tasks/main.yml (flat task list, no
# play wrapper). Same style as the port-range role.
#
# The lockdown lives in git: the valitsus-update.service installed below runs
# `git reset --hard origin/main` + rebuild on every boot, so the app/scenario
# is owned by the GitHub repo and student edits on the box are wiped. Hardened
# credentials live in the persistent ./data volume and survive the rebuild.

- name: Check if docker is already installed
  ansible.builtin.command: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Install docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  when: docker_check.rc != 0

- name: Create apt keyrings dir
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: docker_check.rc != 0

- name: Add docker GPG key
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
    creates: /etc/apt/keyrings/docker.gpg
  when: docker_check.rc != 0

- name: Add docker apt repo
  ansible.builtin.shell:
    cmd: |
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
    creates: /etc/apt/sources.list.d/docker.list
  when: docker_check.rc != 0

- name: Install docker engine + compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  when: docker_check.rc != 0

- name: Enable and start docker
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started

- name: Add user to docker group
  ansible.builtin.user:
    name: user
    groups: docker
    append: yes

- name: Install git
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: yes

- name: Clone valitsus repo
  ansible.builtin.git:
    repo: https://github.com/sammysGG/Athena_Website.git
    dest: /opt/valitsus
    version: main
    force: yes

- name: Fix repo ownership
  ansible.builtin.file:
    path: /opt/valitsus
    state: directory
    owner: root
    group: root
    recurse: yes

- name: Create data dir owned by the container uid (1001)
  ansible.builtin.file:
    path: "/opt/valitsus/{{ item }}"
    state: directory
    owner: '1001'
    group: '1001'
    mode: '0755'
  loop:
    - data

- name: Generate .env (first deploy only — preserves the secret + creds on re-runs)
  ansible.builtin.copy:
    dest: /opt/valitsus/.env
    owner: root
    group: root
    mode: '0600'
    content: |
      NEXTAUTH_SECRET="{{ lookup('pipe', 'openssl rand -hex 32') }}"
      NEXTAUTH_URL="https://{{ hostname }}.{{ domain }}"
      APP_BIND="127.0.0.1"
      APP_PORT="18092"
  when: new_deploy

- name: Allow HTTP/HTTPS through ufw
  ansible.builtin.command: "ufw allow {{ item }}/tcp"
  register: ufw_result
  changed_when: "'added' in ufw_result.stdout or 'updated' in ufw_result.stdout"
  failed_when: false
  loop:
    - 80
    - 443

- name: Build and start the container
  ansible.builtin.command:
    cmd: docker compose up -d --build --force-recreate
    chdir: /opt/valitsus

- name: Verify the app backend is serving its public API
  ansible.builtin.uri:
    url: http://127.0.0.1:18092/api/articles
    status_code: 200
  register: health
  retries: 20
  delay: 3
  until: health.status == 200

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: yes

- name: Create TLS cert directory
  ansible.builtin.file:
    path: /etc/ssl/range
    state: directory
    mode: '0700'

- name: Generate self-signed TLS cert (first deploy only)
  ansible.builtin.shell:
    cmd: >
      openssl req -x509 -nodes -sha256 -days 825 -newkey rsa:2048
      -keyout /etc/ssl/range/key.pem -out /etc/ssl/range/cert.pem
      -subj "/C=UK/CN={{ hostname }}.{{ domain }}"
      -addext "subjectAltName=DNS:{{ hostname }}.{{ domain }}"
    executable: /bin/bash
    creates: /etc/ssl/range/cert.pem
  when: new_deploy

- name: Configure nginx TLS reverse proxy
  ansible.builtin.copy:
    dest: /etc/nginx/sites-available/valitsus.conf
    content: |
      server {
          listen 80;
          server_name {{ hostname }}.{{ domain }};
          return 301 https://$host$request_uri;
      }
      server {
          listen 443 ssl;
          server_name {{ hostname }}.{{ domain }};

          ssl_certificate     /etc/ssl/range/cert.pem;
          ssl_certificate_key /etc/ssl/range/key.pem;

          client_max_body_size 16m;

          location / {
              proxy_pass http://127.0.0.1:18092;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }

- name: Enable the valitsus nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/valitsus.conf
    dest: /etc/nginx/sites-enabled/valitsus.conf
    state: link

- name: Disable the default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
    enabled: yes

- name: Verify HTTPS is serving through nginx
  ansible.builtin.uri:
    url: https://127.0.0.1/api/articles
    validate_certs: no
    headers:
      Host: "{{ hostname }}.{{ domain }}"
    status_code: 200
  register: https_health
  retries: 5
  delay: 2
  until: https_health.status == 200

- name: Install boot-time update script
  ansible.builtin.copy:
    dest: /usr/local/bin/valitsus-update.sh
    mode: '0755'
    owner: root
    group: root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd /opt/valitsus
      git fetch --quiet origin main
      git reset --hard origin/main
      docker compose up -d --build

- name: Install the update systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/valitsus-update.service
    mode: '0644'
    owner: root
    group: root
    content: |
      [Unit]
      Description=Pull valitsus updates from git and (re)start containers
      After=network-online.target docker.service
      Wants=network-online.target
      Requires=docker.service

      [Service]
      Type=oneshot
      WorkingDirectory=/opt/valitsus
      ExecStart=/usr/local/bin/valitsus-update.sh
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

- name: Enable the update unit on boot
  ansible.builtin.systemd:
    name: valitsus-update.service
    enabled: yes
    daemon_reload: yes
